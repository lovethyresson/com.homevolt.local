<style>
  .hint { color: #888; font-size: 0.85em; margin: 6px 0 14px; }
  #repair-ip { width: 100%; box-sizing: border-box; padding: 8px; margin-bottom: 6px; }
</style>

<p>Enter the current IP address of your Homevolt battery.</p>

<label for="repair-ip">IP address</label>
<input type="text" id="repair-ip" placeholder="192.168.2.50" />
<p class="hint">Use this if the battery's address changed and it can no longer be reached.</p>
<button type="button" id="save-btn" class="homey-button-primary-full">Save</button>

<script type="text/javascript">
  Homey.emit('get_ip', null)
    .then((ip) => {
      if (ip) document.getElementById('repair-ip').value = ip;
    })
    .catch((err) => Homey.alert(err.message || err));

  document.getElementById('save-btn').addEventListener('click', () => {
    const ip = document.getElementById('repair-ip').value.trim();
    if (!ip) {
      Homey.alert('Please enter an IP address');
      return;
    }
    Homey.showLoadingOverlay();
    Homey.emit('repair_ip', ip)
      .then(() => Homey.done())
      .catch((err) => {
        Homey.hideLoadingOverlay();
        Homey.alert(err.message || err);
      });
  });
</script>
